spring.application.name=radioisotopo

# configurem el port de sortida diferent a 8080 per evitar problemes
server.port=8081 
# # configruacio basica de bases de dades
spring.datasource.url=jdbc:mysql://localhost:3305/db_radioIsotopo
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=api_user
spring.datasource.password=1234
# IMPORTANT: Activar l'execució dels scripts SQL
spring.sql.init.mode=always
# SQL logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Force Hibernate à respecter les majuscules/minuscules exactes des @Table
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
